name: Deploy YYHome to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yyhome-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure custom domain
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        shell: bash
        run: printf '%s\n' "${{ vars.CUSTOM_DOMAIN }}" > public/CNAME

      - name: Verify source
        run: |
          npm run lint
          npm run test
          npm run build

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
          cname: ${{ vars.CUSTOM_DOMAIN }}
