<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="杨轶的个人主页：探索智能系统、云端应用与有温度的数字体验。"
    />
    <meta name="theme-color" content="#00030c" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>杨轶 · Developer &amp; Researcher</title>
    <script>
      // 在 React 挂载前恢复主题，避免首屏出现明暗闪烁。
      ;(() => {
        const savedTheme = localStorage.getItem('yyhome-theme')
        const theme = savedTheme === 'light' ? 'light' : 'dark'
        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
